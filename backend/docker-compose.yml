services:
  db:
    image: postgres:17.5
    environment:
      POSTGRES_USER: scoreapp
      POSTGRES_PASSWORD: scoreapp123
      POSTGRES_DB: scoreapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >
      sh -c "python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
